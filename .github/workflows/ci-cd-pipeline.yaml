# Reusable CI/CD Pipeline for all Plaintext projects
#
# Jobs: CI (Build+Test+Coverage) → Deploy → Verify DEV → Verify PROD
#
# deploy-target values:
#   ci-only      – Build + Test only (no deployment)
#   snapshot-dev – Snapshot build + deploy to DEV
#   release-dev  – Release + deploy to DEV
#   release-all  – Release + deploy to DEV + deploy to PROD

name: Build And Deploy Pipeline

on:
  workflow_call:
    inputs:
      deploy-target:
        description: 'Deployment target: ci-only | snapshot-dev | release-dev | release-all'
        required: true
        type: string
      project-name:
        description: 'Project display name (e.g. plaintext-app)'
        required: true
        type: string
      database-name:
        description: 'PostgreSQL database name for integration tests'
        required: false
        type: string
        default: 'plaintext'
      java-version:
        description: 'Java version for build and tests'
        required: false
        type: string
        default: '25'
      dev-url:
        description: 'DEV environment base URL for version check and E2E tests'
        required: false
        type: string
        default: ''
      prod-url:
        description: 'PROD environment base URL for version check and E2E tests'
        required: false
        type: string
        default: ''
      playwright-enabled:
        description: 'Run Node.js Playwright E2E tests after deployment'
        required: false
        type: boolean
        default: false
      integration-tests-enabled:
        description: 'Run Java Playwright integration tests (Maven Failsafe) against deployed app'
        required: false
        type: boolean
        default: false
    secrets:
      TWINGATE_SERVICE_KEY:
        required: true
      MVN_DEPLOY_TOKEN:
        required: true
      SSH_PRIVATE_KEY:
        required: false

jobs:
  # ── Build + Test + Coverage ────────────────────────────────────
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: ${{ inputs.database-name }}
          POSTGRES_USER: plaintext
          POSTGRES_PASSWORD: plaintext
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U plaintext"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JDK ${{ inputs.java-version }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ inputs.java-version }}
          distribution: temurin
          cache: maven
          server-id: plaintext
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Build & Test
        run: mvn clean install -B -DskipITs
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5434/${{ inputs.database-name }}
          SPRING_DATASOURCE_USERNAME: plaintext
          SPRING_DATASOURCE_PASSWORD: plaintext
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.MVN_DEPLOY_TOKEN }}

      - name: Generate Coverage Report
        if: always()
        run: mvn jacoco:report -B
        continue-on-error: true

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: '**/target/surefire-reports/*.xml'
          retention-days: 7

      - name: Upload Coverage Reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports
          path: '**/target/site/jacoco/'
          retention-days: 14

      - name: Coverage Summary
        if: always()
        env:
          PROJECT_NAME: ${{ inputs.project-name }}
        run: |
          echo "## Code Coverage – $PROJECT_NAME" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Module | Coverage |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|----------|" >> $GITHUB_STEP_SUMMARY
          for report in $(find . -path "*/target/site/jacoco/jacoco.csv" 2>/dev/null); do
            module=$(echo "$report" | sed 's|./\(.*\)/target/.*|\1|')
            if [ -f "$report" ]; then
              missed=$(tail -n +2 "$report" | awk -F',' '{sum+=$4} END {print sum+0}')
              covered=$(tail -n +2 "$report" | awk -F',' '{sum+=$5} END {print sum+0}')
              total=$((missed + covered))
              if [ "$total" -gt 0 ]; then
                pct=$((covered * 100 / total))
                echo "| $module | ${pct}% (${covered}/${total}) |" >> $GITHUB_STEP_SUMMARY
              fi
            fi
          done

  # ── Deploy ─────────────────────────────────────────────────────
  deploy:
    name: "Deploy (${{ inputs.deploy-target }})"
    needs: ci
    if: inputs.deploy-target != 'ci-only'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: write

    steps:
      - name: Connect to Twingate
        uses: twingate/github-action@v1
        with:
          service-key: ${{ secrets.TWINGATE_SERVICE_KEY }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.MVN_DEPLOY_TOKEN }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.email "github@plaintext.ch"
          git config user.name "GithubActions"

      - name: Checkout plaintext-scripts
        uses: actions/checkout@v6
        with:
          repository: daniel-marthaler/plaintext-scripts
          path: plaintext-scripts
          token: ${{ secrets.MVN_DEPLOY_TOKEN }}

      - name: Install plaintext-scripts
        run: |
          mkdir -p $HOME/codeplain
          cp -r plaintext-scripts $HOME/codeplain/plaintext-scripts
          chmod +x $HOME/codeplain/plaintext-scripts/*.sh

      - name: Checkout plaintext-config
        uses: actions/checkout@v6
        with:
          repository: daniel-marthaler/plaintext-config
          path: plaintext-config
          token: ${{ secrets.MVN_DEPLOY_TOKEN }}

      - name: Install plaintext-config
        run: cp -r plaintext-config $HOME/codeplain/plaintext-config

      - name: Setup JDK ${{ inputs.java-version }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ inputs.java-version }}
          distribution: temurin

      - name: Configure Maven
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << EOF
          <settings>
            <servers>
              <server>
                <id>plaintext</id>
                <username>daniel-marthaler</username>
                <password>${{ secrets.MVN_DEPLOY_TOKEN }}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 192.168.1.224 >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh-keyscan -H 192.168.0.7 >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Build & Deploy
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.MVN_DEPLOY_TOKEN }}
          CI: 'true'
          DEPLOY_TARGET: ${{ inputs.deploy-target }}
        run: |
          chmod +x ./build
          case "$DEPLOY_TARGET" in
            snapshot-dev)
              echo "=== Snapshot Build + Deploy DEV ==="
              ./build build deploy
              ;;
            release-dev)
              echo "=== Release + Deploy DEV ==="
              ./build release deploy-healthcheck
              ;;
            release-all)
              echo "=== Release + Deploy DEV + PROD ==="
              ./build 56
              ;;
            *)
              echo "Unknown deploy target: $DEPLOY_TARGET"
              exit 1
              ;;
          esac

      - name: Deploy Summary
        if: always()
        env:
          PROJECT_NAME: ${{ inputs.project-name }}
          DEPLOY_TARGET: ${{ inputs.deploy-target }}
        run: |
          echo "## Deploy Summary – $PROJECT_NAME" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Target** | \`$DEPLOY_TARGET\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Version** | $(mvn help:evaluate -Dexpression=project.version -q -DforceStdout 2>/dev/null || grep -m1 '<version>' pom.xml | sed 's/.*<version>//;s/<\/version>.*//' | tr -d ' ') |" >> $GITHUB_STEP_SUMMARY
          echo "| **Release** | $(git describe --tags --abbrev=0 --match '[0-9]*.[0-9]*.[0-9]*' 2>/dev/null || echo 'n/a') |" >> $GITHUB_STEP_SUMMARY

  # ── Verify DEV ─────────────────────────────────────────────────
  verify-dev:
    name: Verify DEV
    needs: deploy
    if: inputs.deploy-target != 'ci-only' && inputs.dev-url != ''
    runs-on: ubuntu-latest

    steps:
      - name: Connect to Twingate
        uses: twingate/github-action@v1
        with:
          service-key: ${{ secrets.TWINGATE_SERVICE_KEY }}

      - name: Version Check DEV
        env:
          DEV_URL: ${{ inputs.dev-url }}
        run: |
          echo "Verifying DEV at $DEV_URL/nosec/version ..."
          for i in $(seq 1 24); do
            RESPONSE=$(curl -sf "$DEV_URL/nosec/version" 2>/dev/null) && {
              echo "DEV running: $RESPONSE"
              echo "## Verify DEV" >> $GITHUB_STEP_SUMMARY
              echo "Version: \`$RESPONSE\`" >> $GITHUB_STEP_SUMMARY
              exit 0
            }
            echo "Waiting for DEV... ($i/24)"
            sleep 5
          done
          echo "DEV version check failed after 2 minutes"
          exit 1

      # ── Java Integration Tests (Maven Failsafe) ──
      - name: Checkout
        if: inputs.integration-tests-enabled || inputs.playwright-enabled
        uses: actions/checkout@v6

      - name: Setup JDK ${{ inputs.java-version }}
        if: inputs.integration-tests-enabled
        uses: actions/setup-java@v5
        with:
          java-version: ${{ inputs.java-version }}
          distribution: temurin
          cache: maven
          server-id: plaintext
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Install Playwright Browser
        if: inputs.integration-tests-enabled
        run: npx playwright install --with-deps chromium

      - name: Integration Tests (DEV)
        if: inputs.integration-tests-enabled
        run: mvn verify -B -Dsurefire.skip=true "-Dtest.server.url=$DEV_URL"
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.MVN_DEPLOY_TOKEN }}
          DEV_URL: ${{ inputs.dev-url }}

      - name: Upload Integration Test Results (DEV)
        if: inputs.integration-tests-enabled && always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-results-dev
          path: '**/target/failsafe-reports/*.xml'
          retention-days: 7

      - name: Upload Screenshots (DEV)
        if: inputs.integration-tests-enabled && always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-screenshots-dev
          path: '**/target/screenshots/'
          retention-days: 7
          if-no-files-found: ignore

      # ── Node.js Playwright Tests ──
      - name: Setup Node.js
        if: inputs.playwright-enabled
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install Node.js Playwright
        if: inputs.playwright-enabled
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Playwright E2E Tests (DEV)
        if: inputs.playwright-enabled
        run: npx playwright test
        env:
          BASE_URL: ${{ inputs.dev-url }}

      - name: Upload Playwright Report (DEV)
        if: inputs.playwright-enabled && always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-dev
          path: playwright-report/
          retention-days: 7

  # ── Verify PROD ────────────────────────────────────────────────
  verify-prod:
    name: Verify PROD
    needs: verify-dev
    if: inputs.deploy-target == 'release-all' && inputs.prod-url != ''
    runs-on: ubuntu-latest

    steps:
      - name: Connect to Twingate
        uses: twingate/github-action@v1
        with:
          service-key: ${{ secrets.TWINGATE_SERVICE_KEY }}

      - name: Version Check PROD
        env:
          PROD_URL: ${{ inputs.prod-url }}
        run: |
          echo "Verifying PROD at $PROD_URL/nosec/version ..."
          for i in $(seq 1 24); do
            RESPONSE=$(curl -sf "$PROD_URL/nosec/version" 2>/dev/null) && {
              echo "PROD running: $RESPONSE"
              echo "## Verify PROD" >> $GITHUB_STEP_SUMMARY
              echo "Version: \`$RESPONSE\`" >> $GITHUB_STEP_SUMMARY
              exit 0
            }
            echo "Waiting for PROD... ($i/24)"
            sleep 5
          done
          echo "PROD version check failed after 2 minutes"
          exit 1

      # ── Java Integration Tests (Maven Failsafe) ──
      - name: Checkout
        if: inputs.integration-tests-enabled || inputs.playwright-enabled
        uses: actions/checkout@v6

      - name: Setup JDK ${{ inputs.java-version }}
        if: inputs.integration-tests-enabled
        uses: actions/setup-java@v5
        with:
          java-version: ${{ inputs.java-version }}
          distribution: temurin
          cache: maven
          server-id: plaintext
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Install Playwright Browser
        if: inputs.integration-tests-enabled
        run: npx playwright install --with-deps chromium

      - name: Integration Tests (PROD)
        if: inputs.integration-tests-enabled
        run: mvn verify -B -Dsurefire.skip=true "-Dtest.server.url=$PROD_URL"
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.MVN_DEPLOY_TOKEN }}
          PROD_URL: ${{ inputs.prod-url }}

      - name: Upload Integration Test Results (PROD)
        if: inputs.integration-tests-enabled && always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-results-prod
          path: '**/target/failsafe-reports/*.xml'
          retention-days: 7

      - name: Upload Screenshots (PROD)
        if: inputs.integration-tests-enabled && always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-screenshots-prod
          path: '**/target/screenshots/'
          retention-days: 7
          if-no-files-found: ignore

      # ── Node.js Playwright Tests ──
      - name: Setup Node.js
        if: inputs.playwright-enabled
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install Node.js Playwright
        if: inputs.playwright-enabled
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Playwright E2E Tests (PROD)
        if: inputs.playwright-enabled
        run: npx playwright test
        env:
          BASE_URL: ${{ inputs.prod-url }}

      - name: Upload Playwright Report (PROD)
        if: inputs.playwright-enabled && always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-prod
          path: playwright-report/
          retention-days: 7
