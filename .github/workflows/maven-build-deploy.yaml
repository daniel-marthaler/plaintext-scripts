name: Maven Build & Deploy (Reusable)

on:
  workflow_call:
    inputs:
      build-command:
        description: 'Build command to run after mvn deploy (e.g. "56" for release+deploy DEV+PROD, "5" for DEV only)'
        required: false
        type: string
        default: '56'
    secrets:
      TWINGATE_SERVICE_KEY:
        required: true
      MVN_DEPLOY_TOKEN:
        required: true
      SSH_PRIVATE_KEY:
        required: false

jobs:
  build-deploy:
    runs-on: ubuntu-24.04

    steps:
      - name: Connect to Twingate
        uses: twingate/github-action@v1
        with:
          service-key: ${{ secrets.TWINGATE_SERVICE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout plaintext-scripts
        uses: actions/checkout@v4
        with:
          repository: daniel-marthaler/plaintext-scripts
          path: ../plaintext-scripts

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Configure Maven settings
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << EOF
          <settings>
            <servers>
              <server>
                <id>plaintext</id>
                <username>daniel-marthaler</username>
                <password>${{ secrets.MVN_DEPLOY_TOKEN }}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Setup SSH for NAS deployment
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 192.168.1.224 >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh-keyscan -H 192.168.0.7 >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Setup Podman
        if: hashFiles('Dockerfile') != ''
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq podman

      - name: Maven Deploy to GitHub Packages
        run: mvn clean deploy -DskipTests -B

      - name: Build & Deploy to NAS
        if: hashFiles('Dockerfile') != '' && hashFiles('build-conf.txt') != ''
        run: |
          chmod +x ./build
          chmod +x ../plaintext-scripts/*.sh
          ./build ${{ inputs.build-command }}
