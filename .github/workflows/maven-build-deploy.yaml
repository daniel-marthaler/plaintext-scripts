name: Maven Build & Deploy (Reusable)

on:
  workflow_call:
    secrets:
      TWINGATE_SERVICE_KEY:
        required: true
      MVN_DEPLOY_TOKEN:
        required: true

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Connect to Twingate
        uses: twingate/github-action@v1
        with:
          service-key: ${{ secrets.TWINGATE_SERVICE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Configure Maven settings
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << EOF
          <settings>
            <servers>
              <server>
                <id>plaintext</id>
                <username>daniel-marthaler</username>
                <password>${{ secrets.MVN_DEPLOY_TOKEN }}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Build & Deploy
        run: mvn clean deploy -DskipTests -B
