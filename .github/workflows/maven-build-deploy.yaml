name: Maven Build & Deploy (Reusable)

on:
  workflow_call:
    inputs:
      build-command:
        description: 'Build command (e.g. "56" for release+deploy DEV+PROD, "5" for DEV only)'
        required: false
        type: string
        default: '56'
      build-config:
        description: 'Content of plaintext-build.cfg (passed as PLAINTEXT_BUILD_CONFIG env, overrides config file in repo)'
        required: false
        type: string
        default: ''
    secrets:
      TWINGATE_SERVICE_KEY:
        required: true
      MVN_DEPLOY_TOKEN:
        required: true
      SSH_PRIVATE_KEY:
        required: false
      BUILD_CONFIG:
        required: false
        description: 'Alternative: pass plaintext-build.cfg content as secret'

jobs:
  build-deploy:
    runs-on: ubuntu-24.04

    steps:
      - name: Connect to Twingate
        uses: twingate/github-action@v1
        with:
          service-key: ${{ secrets.TWINGATE_SERVICE_KEY }}

      - name: Checkout (with push access)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MVN_DEPLOY_TOKEN }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.email "github@plaintext.ch"
          git config user.name "GithubActions"

      - name: Checkout plaintext-scripts
        uses: actions/checkout@v4
        with:
          repository: daniel-marthaler/plaintext-scripts
          path: plaintext-scripts

      - name: Install plaintext-scripts to ~/.plaintext-scripts
        run: |
          cp -r plaintext-scripts $HOME/.plaintext-scripts
          chmod +x $HOME/.plaintext-scripts/*.sh

      - name: Setup JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Configure Maven settings
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << EOF
          <settings>
            <servers>
              <server>
                <id>plaintext</id>
                <username>daniel-marthaler</username>
                <password>${{ secrets.MVN_DEPLOY_TOKEN }}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Setup SSH for NAS deployment
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 192.168.1.224 >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh-keyscan -H 192.168.0.7 >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Release, Build & Deploy
        env:
          PLAINTEXT_BUILD_CONFIG: ${{ inputs.build-config || secrets.BUILD_CONFIG }}
          BUILD_COMMAND: ${{ inputs.build-command }}
        run: |
          chmod +x ./build
          ./build "$BUILD_COMMAND"
